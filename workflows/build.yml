name: 🛡️ GuardCall — Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Sélectionner Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app
          xcodebuild -version

      - name: 📦 Installer XcodeGen via Homebrew
        run: brew install xcodegen

      - name: ⚙️ Générer le .xcodeproj
        run: |
          cd GuardCall
          xcodegen generate
          echo "✅ xcodeproj généré"
          ls -la

      - name: 🏗️ Build & Archive
        run: |
          cd GuardCall
          xcodebuild archive \
            -project GuardCall.xcodeproj \
            -scheme GuardCall \
            -configuration Release \
            -archivePath $RUNNER_TEMP/GuardCall.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -allowProvisioningUpdates \
            | xcpretty || true

      - name: 📲 Créer le .ipa
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          APP_PATH=$(find $RUNNER_TEMP/GuardCall.xcarchive -name "*.app" | head -1)
          echo "App trouvée : $APP_PATH"
          cp -r "$APP_PATH" $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r GuardCall.ipa Payload/
          echo "✅ IPA créé : $(du -sh GuardCall.ipa)"

      - name: ⬆️ Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GuardCall-IPA
          path: ${{ runner.temp }}/GuardCall.ipa
          retention-days: 30
